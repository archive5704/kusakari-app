<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年 草刈り日和カレンダー</title>
  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-title" content="草刈り日和" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --shadow:0 12px 30px rgba(15,23,42,.08);
      --emerald-bg:#ecfdf5; --emerald-bd:#a7f3d0; --emerald-tx:#065f46;
      --sky-bg:#eff6ff; --sky-bd:#bae6fd; --sky-tx:#075985;
      --slate-bg:#f1f5f9; --slate-bd:#cbd5e1; --slate-tx:#475569;
      --rose-bg:#fff1f2; --rose-bd:#fecdd3; --rose-tx:#9f1239;
      --violet-bg:#f5f3ff; --violet-tx:#5b21b6;
      --gold: rgba(212,175,55,.6);
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;
    }
    .page{padding:16px}
    .wrap{max-width:1080px;margin:0 auto}
    .card{
      background:var(--card); border-radius:28px; box-shadow:var(--shadow);
      overflow:hidden;
    }
    .header{padding:24px 20px 8px}
    .top-badge{
      display:inline-flex; align-items:center; gap:8px; background:#f1f5f9; color:#334155;
      border-radius:999px; padding:6px 12px; font-size:14px;
    }
    .controls{display:flex; justify-content:flex-end; margin-top:12px}
    select{
      appearance:none; border:1px solid var(--line); background:#fff; color:#0f172a;
      border-radius:16px; padding:10px 14px; font-size:14px; min-width:120px;
    }
    .content{padding:16px 20px 24px}
    .weekdays,.grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px}
    .weekdays{margin-bottom:8px; color:var(--muted); font-size:14px; font-weight:600; text-align:center}
    .weekday{padding:4px 0}
    .cell{
      min-height:122px; border:1px solid var(--line); border-radius:18px; padding:8px; background:#fff;
      transition:box-shadow .4s ease, border-color .2s ease, background-color .2s ease;
    }
    .cell.empty{border-color:transparent;background:transparent}
    .cell.today{animation:todayGlow 2.8s ease-in-out infinite}
    @keyframes todayGlow{
      0%,100%{box-shadow:0 0 0 rgba(212,175,55,0)}
      50%{box-shadow:0 0 14px var(--gold)}
    }
    .tone-bad{background:var(--rose-bg); border-color:var(--rose-bd)}
    .tone-double{background:var(--emerald-bg); border-color:var(--emerald-bd)}
    .tone-good{background:var(--sky-bg); border-color:var(--sky-bd)}
    .tone-near{background:var(--slate-bg); border-color:var(--slate-bd)}
    .cell-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px}
    .date{
      font-size:16px; font-weight:700; color:#0f172a; white-space:nowrap;
    }
    .date small{font-size:12px; color:#64748b; margin-left:2px}
    .mark{
      display:inline-flex; align-items:center; justify-content:center;
      padding:2px 8px; min-width:24px; border-radius:999px; font-size:12px; font-weight:700;
    }
    .mark.bad{background:#ffe4e6;color:#9f1239}
    .mark.double{background:#d1fae5;color:#065f46}
    .mark.good{background:#e0f2fe;color:#075985}
    .mark.near{background:#e2e8f0;color:#475569}
    .details{display:flex; flex-direction:column; gap:4px; margin-top:8px; font-size:11px; color:#475569; line-height:1.35}
    .chip{
      display:inline-flex; width:max-content; align-items:center; gap:6px;
      border-radius:999px; padding:2px 8px; font-size:11px; font-weight:500;
    }
    .chip.violet{background:var(--violet-bg); color:var(--violet-tx)}
    .legend{
      margin-top:16px; border-top:1px solid var(--line); padding-top:16px;
      display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
    }
    .legend-item{
      display:flex; align-items:center; gap:12px; border:1px solid var(--line);
      border-radius:18px; padding:12px; background:#fff;
    }
    .legend-mark{
      display:flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:999px; border:1px solid currentColor; font-weight:700;
      flex:0 0 auto;
    }
    .legend-text{font-size:14px; color:#334155}
    .legend-mark.double{background:#d1fae5;color:#065f46}
    .legend-mark.good{background:#e0f2fe;color:#075985}
    .legend-mark.near{background:#e2e8f0;color:#475569}
    .legend-mark.bad{background:#ffe4e6;color:#9f1239}
    @media (max-width: 860px){
      .legend{grid-template-columns:1fr}
    }
    @media (max-width: 700px){
      .page{padding:12px}
      .header{padding:20px 14px 8px}
      .content{padding:12px 14px 18px}
      .weekdays,.grid{gap:6px}
      .weekdays{font-size:12px}
      .cell{min-height:112px;padding:6px;border-radius:14px}
      .date{font-size:14px}
      .details{font-size:10px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="card">
        <div class="header">
          <div class="top-badge">📅 2026年 草刈り日和カレンダー</div>
          <div class="controls">
            <select id="monthSelect" aria-label="月を選択"></select>
          </div>
        </div>

        <div class="content">
          <div class="weekdays" id="weekdays"></div>
          <div class="grid" id="calendarGrid"></div>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </div>
  </div>

<script>
const YEAR = 2026;
const MONTH_NAMES = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const WEEKDAYS = ["日","月","火","水","木","金","土"];

const MOON_DATA = {
  1: { full: [3], newMoon: [19], lastQuarter: [11], firstQuarter: [26] },
  2: { full: [2], newMoon: [17], lastQuarter: [9], firstQuarter: [24] },
  3: { full: [3], newMoon: [19], lastQuarter: [11], firstQuarter: [26] },
  4: { full: [2], newMoon: [17], lastQuarter: [10], firstQuarter: [24] },
  5: { full: [2, 31], newMoon: [17], lastQuarter: [10], firstQuarter: [23] },
  6: { full: [30], newMoon: [15], lastQuarter: [8], firstQuarter: [22] },
  7: { full: [29], newMoon: [14], lastQuarter: [8], firstQuarter: [21] },
  8: { full: [28], newMoon: [13], lastQuarter: [6], firstQuarter: [20] },
  9: { full: [27], newMoon: [11], lastQuarter: [4], firstQuarter: [19] },
  10: { full: [26], newMoon: [11], lastQuarter: [3], firstQuarter: [19] },
  11: { full: [24], newMoon: [9], lastQuarter: [2], firstQuarter: [17] },
  12: { full: [24], newMoon: [9], lastQuarter: [1, 31], firstQuarter: [17] },
};

const SOIL_DATA = {
  1: { big: [1, 2, 3], small: [9, 10, 11, 12, 13, 14, 15], doyo: [] },
  2: { big: [], small: [], doyo: [] },
  3: { big: [2, 3, 4, 5], small: [8, 9, 10, 11, 12, 13], doyo: [] },
  4: { big: [], small: [], doyo: [16, 17, 18, 19, 20, 21] },
  5: { big: [], small: [8, 9, 10, 11, 12], doyo: [] },
  6: { big: [], small: [], doyo: [] },
  7: { big: [2, 3, 4, 5, 6, 7], small: [8, 9, 10, 11, 12, 13], doyo: [] },
  8: { big: [23, 24, 25, 26, 27, 28], small: [], doyo: [] },
  9: { big: [], small: [1, 2, 3, 4, 5, 6, 7], doyo: [] },
  10: { big: [16, 17, 18, 19, 20, 21], small: [], doyo: [] },
  11: { big: [], small: [23, 24, 25, 26, 27, 28], doyo: [] },
  12: { big: [22, 23, 24, 25, 26, 27, 28], small: [], doyo: [] },
};

const KANSHI_CYCLE = [
  "甲子","乙丑","丙寅","丁卯","戊辰","己巳","庚午","辛未","壬申","癸酉",
  "甲戌","乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未",
  "甲申","乙酉","丙戌","丁亥","戊子","己丑","庚寅","辛卯","壬辰","癸巳",
  "甲午","乙未","丙申","丁酉","戊戌","己亥","庚子","辛丑","壬寅","癸卯",
  "甲辰","乙巳","丙午","丁未","戊申","己酉","庚戌","辛亥","壬子","癸丑",
  "甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申","辛酉","壬戌","癸亥",
];
const JAN_1_KANSHI = "乙亥";
const BAD_KANSHI_JAN_ONLY = new Set(["乙亥","丙子","丁丑","戊寅","己卯","庚辰","辛巳","壬午","癸未","甲申"]);
const BAD_KANSHI_FORCE = new Set(["辛亥","壬子","癸丑","甲寅","乙卯","丙辰","丁巳","戊午","己未","庚申"]);

const LEGEND = [
  { key: "double", label: "◎", description: "下弦の月から上弦の月まで かつ 大つち・小つち・土用" },
  { key: "good", label: "○", description: "下弦の月から上弦の月まで" },
  { key: "near", label: "△", description: "下弦の月から上弦の月までの前後3日" },
  { key: "bad", label: "×", description: "1月のみ 乙亥から甲申まで ＋ 辛亥から庚申は通年" },
];

function pad(n){ return String(n).padStart(2,"0"); }
function toKey(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function parseKey(key){ const [y,m,d] = key.split("-").map(Number); return new Date(y,m-1,d); }
function addDays(key, days){ const dt = parseKey(key); dt.setDate(dt.getDate()+days); return toKey(dt.getFullYear(), dt.getMonth()+1, dt.getDate()); }

function buildMoonIntervals(){
  const quarterEvents = [];
  Object.entries(MOON_DATA).forEach(([month, data]) => {
    data.lastQuarter.forEach(day => quarterEvents.push({ type:"last", key: toKey(YEAR, Number(month), day) }));
    data.firstQuarter.forEach(day => quarterEvents.push({ type:"first", key: toKey(YEAR, Number(month), day) }));
  });
  quarterEvents.sort((a,b) => parseKey(a.key) - parseKey(b.key));
  const intervals = [];
  for(let i=0;i<quarterEvents.length;i++){
    if(quarterEvents[i].type !== "last") continue;
    const nextFirst = quarterEvents.slice(i+1).find(item => item.type === "first");
    if(nextFirst) intervals.push({ start: quarterEvents[i].key, end: nextFirst.key });
  }
  return intervals;
}

function eachDateBetween(startKey, endKey){
  const dates = [];
  let cursor = parseKey(startKey);
  const end = parseKey(endKey);
  while(cursor <= end){
    dates.push(toKey(cursor.getFullYear(), cursor.getMonth()+1, cursor.getDate()));
    cursor.setDate(cursor.getDate()+1);
  }
  return dates;
}

function buildCalendarData(){
  const jan1Index = KANSHI_CYCLE.indexOf(JAN_1_KANSHI);
  const intervals = buildMoonIntervals();
  const moonGood = new Set();
  const moonNear = new Set();

  intervals.forEach(({ start, end }) => {
    eachDateBetween(start, end).forEach(key => moonGood.add(key));
    eachDateBetween(addDays(start, -3), addDays(start, -1)).forEach(key => moonNear.add(key));
    eachDateBetween(addDays(end, 1), addDays(end, 3)).forEach(key => moonNear.add(key));
  });

  const soilDays = new Set();
  Object.entries(SOIL_DATA).forEach(([month, groups]) => {
    ["big","small","doyo"].forEach(kind => {
      groups[kind].forEach(day => soilDays.add(toKey(YEAR, Number(month), day)));
    });
  });

  const fullMoonDays = new Set();
  const newMoonDays = new Set();
  const newMoonList = [new Date(2025, 11, 19)];

  Object.entries(MOON_DATA).forEach(([month, data]) => {
    data.full.forEach(day => fullMoonDays.add(toKey(YEAR, Number(month), day)));
    data.newMoon.forEach(day => {
      const key = toKey(YEAR, Number(month), day);
      newMoonDays.add(key);
      newMoonList.push(parseKey(key));
    });
  });

  newMoonList.sort((a,b) => a - b);

  const items = [];
  const start = new Date(YEAR, 0, 1);
  const end = new Date(YEAR, 11, 31);

  for(let cursor = new Date(start); cursor <= end; cursor.setDate(cursor.getDate()+1)){
    const key = toKey(cursor.getFullYear(), cursor.getMonth()+1, cursor.getDate());
    const diffDays = Math.floor((cursor - start) / 86400000);
    const kanshi = KANSHI_CYCLE[(jan1Index + diffDays) % 60];

    const isBadKanshi = (cursor.getMonth() === 0 && BAD_KANSHI_JAN_ONLY.has(kanshi)) || BAD_KANSHI_FORCE.has(kanshi);
    const isMoonGood = moonGood.has(key);
    const isMoonNear = !isMoonGood && moonNear.has(key);
    const isSoil = soilDays.has(key);
    const isFullMoon = fullMoonDays.has(key);
    const isNewMoon = newMoonDays.has(key);

    let moonAge = null;
    for(let i=newMoonList.length - 1; i>=0; i--){
      if(cursor >= newMoonList[i]){
        moonAge = Math.floor((cursor - newMoonList[i]) / 86400000);
        break;
      }
    }
    const is26Night = moonAge === 26;

    let mark = "";
    if(isBadKanshi) mark = "×";
    else if(isMoonGood && isSoil) mark = "◎";
    else if(isMoonGood) mark = "○";
    else if(isMoonNear) mark = "△";

    items.push({
      key,
      year: cursor.getFullYear(),
      month: cursor.getMonth()+1,
      day: cursor.getDate(),
      weekday: cursor.getDay(),
      kanshi,
      isBadKanshi,
      isMoonGood,
      isMoonNear,
      isSoil,
      isFullMoon,
      isNewMoon,
      is26Night,
      mark
    });
  }
  return items;
}

function cellTone(item){
  if(item.isBadKanshi) return "tone-bad";
  if(item.isMoonGood && item.isSoil) return "tone-double";
  if(item.isMoonGood) return "tone-good";
  if(item.isMoonNear) return "tone-near";
  return "";
}
function markTone(item){
  if(item.isBadKanshi) return "bad";
  if(item.isMoonGood && item.isSoil) return "double";
  if(item.isMoonGood) return "good";
  if(item.isMoonNear) return "near";
  return "";
}
function buildMonthGrid(year, month, items){
  const firstDay = new Date(year, month-1, 1);
  const lastDate = new Date(year, month, 0).getDate();
  const leading = firstDay.getDay();
  const monthItems = items.filter(item => item.month === month);
  const cells = [];
  for(let i=0;i<leading;i++) cells.push(null);
  for(let day=1;day<=lastDate;day++){
    cells.push(monthItems.find(item => item.day === day) || null);
  }
  while(cells.length % 7 !== 0) cells.push(null);
  return cells;
}

const allItems = buildCalendarData();
const today = new Date();
const todayKey = toKey(today.getFullYear(), today.getMonth()+1, today.getDate());
const defaultMonth = today.getFullYear() === YEAR ? String(today.getMonth()+1) : "4";

const monthSelect = document.getElementById("monthSelect");
const weekdays = document.getElementById("weekdays");
const calendarGrid = document.getElementById("calendarGrid");
const legend = document.getElementById("legend");

WEEKDAYS.forEach(day => {
  const div = document.createElement("div");
  div.className = "weekday";
  div.textContent = day;
  weekdays.appendChild(div);
});

MONTH_NAMES.forEach((name, idx) => {
  const opt = document.createElement("option");
  opt.value = String(idx+1);
  opt.textContent = name;
  monthSelect.appendChild(opt);
});
monthSelect.value = defaultMonth;

LEGEND.forEach(item => {
  const box = document.createElement("div");
  box.className = "legend-item";
  const mark = document.createElement("div");
  mark.className = `legend-mark ${item.key}`;
  mark.textContent = item.label;
  const text = document.createElement("div");
  text.className = "legend-text";
  text.textContent = item.description;
  box.appendChild(mark);
  box.appendChild(text);
  legend.appendChild(box);
});

function chip(text){
  const el = document.createElement("div");
  el.className = "chip violet";
  el.textContent = text;
  return el;
}

function render(month){
  calendarGrid.innerHTML = "";
  const cells = buildMonthGrid(YEAR, month, allItems);

  cells.forEach((item, idx) => {
    const cell = document.createElement("div");
    cell.className = `cell ${item ? cellTone(item) : "empty"} ${item && item.key === todayKey ? "today" : ""}`;

    if(!item){
      calendarGrid.appendChild(cell);
      return;
    }

    const top = document.createElement("div");
    top.className = "cell-top";

    const date = document.createElement("div");
    date.className = "date";
    date.innerHTML = `${item.day}<small>(${WEEKDAYS[item.weekday]})</small>`;
    top.appendChild(date);

    if(item.mark){
      const mark = document.createElement("div");
      mark.className = `mark ${markTone(item)}`;
      mark.textContent = item.mark;
      top.appendChild(mark);
    }

    const details = document.createElement("div");
    details.className = "details";

    const kanshi = document.createElement("div");
    kanshi.textContent = `干支：${item.kanshi}`;
    details.appendChild(kanshi);

    if(item.isFullMoon) details.appendChild(chip("🌕 満月"));
    if(item.isNewMoon) details.appendChild(chip("🌑 新月"));
    if(MOON_DATA[item.month]?.firstQuarter.includes(item.day)) details.appendChild(chip("🌓 上弦の月"));
    if(MOON_DATA[item.month]?.lastQuarter.includes(item.day)) details.appendChild(chip("🌗 下弦の月"));
    if(item.is26Night) details.appendChild(chip("🌘 二十六夜"));

    cell.appendChild(top);
    cell.appendChild(details);
    calendarGrid.appendChild(cell);
  });
}

monthSelect.addEventListener("change", e => render(Number(e.target.value)));
render(Number(defaultMonth));
</script>
</body>
</html>
